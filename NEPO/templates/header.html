<style>
    /* Scope the fonts and colors to the nav components */
    .top-nav {
        background-color: #1a202c;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 15px;
        position: sticky;
        top: 0;
        z-index: 100;
        font-family: sans-serif;
    }

    .red-bar {
        height: 4px;
        background-color: #e53e3e;
        width: 100%;
    }

    /* Sidebar Navigation Logic */
    .side-nav {
        position: fixed;
        top: 0;
        left: -100%;
        width: 300px;
        height: 100%;
        background: white;
        z-index: 200;
        transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 4px 0 15px rgba(0,0,0,0.3);
        display: flex;
        flex-direction: column;
    }

    .side-nav.active {
        left: 0;
    }

    .overlay-mask {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        display: none;
        z-index: 150;
    }

    /* Overlays (About/Contact) */
    .page-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #1a202c; 
        color: white;
        z-index: 300;
        display: none;
        flex-direction: column;
        padding: 40px 20px;
        overflow-y: auto;
    }

    .nav-link {
        padding: 15px 20px;
        border-bottom: 1px solid #f0f0f0;
        display: flex;
        align-items: center;
        gap: 12px;
        color: #2d3748;
        font-weight: 500;
        text-decoration: none;
    }

    .nav-btn-navy {
        margin: 10px 20px;
        padding: 12px;
        background-color: #1a202c;
        color: white;
        border-radius: 6px;
        text-align: center;
        font-weight: 600;
        text-decoration: none;
    }

    .nav-btn-outline-navy {
        margin: 0 20px 10px 20px;
        padding: 12px;
        border: 2px solid #1a202c;
        color: #1a202c;
        border-radius: 6px;
        text-align: center;
        font-weight: 600;
        text-decoration: none;
    }
</style>

<div class="top-nav">
    <div class="flex items-center gap-4">
        <button onclick="toggleMenu()" class="text-white text-xl p-2 bg-transparent border-none cursor-pointer">
            <i class="fas fa-bars"></i>
        </button>
        <div class="flex items-center gap-2">
            <i class="fas fa-graduation-cap text-white text-2xl"></i>
            <span class="text-white font-bold text-lg">NEPO <span class="text-gray-400">SCHOLARSHIP</span></span>
        </div>
    </div>
</div>
<div class="red-bar"></div>

<div id="overlayMask" class="overlay-mask" onclick="toggleMenu()"></div>

<div id="sideNav" class="side-nav">
    <div class="p-5 border-b flex justify-between items-center bg-gray-50">
        <span class="font-bold text-gray-800">MAIN NAVIGATION</span>
        <button onclick="toggleMenu()" class="text-2xl text-gray-400 border-none bg-transparent cursor-pointer">&times;</button>
    </div>
    
    <div class="flex flex-col py-2">
        <a href="{% url 'schlarship' %}" class="nav-link"><i class="fas fa-home"></i> Home</a>
        <button onclick="showOverlay('aboutOverlay')" class="nav-link w-full text-left bg-transparent border-none cursor-pointer">
            <i class="fas fa-info-circle"></i> About NEPO
        </button>
        <button onclick="showOverlay('contactOverlay')" class="nav-link w-full text-left bg-transparent border-none cursor-pointer">
            <i class="fas fa-envelope"></i> Contact Us
        </button>
    </div>

    <div class="mt-auto pb-6">
        <a href="{% url 'login' %}" class="nav-btn-navy block">Login to Portal</a>
        <a href="{% url 'apply' %}" class="nav-btn-outline-navy block" onclick="toggleMenu()">Apply Now</a>
        <div class="px-5 mt-4 flex justify-center gap-6 text-gray-400">
            <i class="fab fa-facebook-f"></i>
            <i class="fab fa-twitter"></i>
            <i class="fab fa-linkedin-in"></i>
        </div>
    </div>
</div>

<div id="aboutOverlay" class="page-overlay">
    <button onclick="hideOverlay('aboutOverlay')" class="absolute top-8 right-8 text-4xl bg-transparent border-none text-white cursor-pointer">&times;</button>
    <div class="max-w-md mx-auto mt-10">
        <h2 class="text-3xl font-bold mb-6 text-green-400">About the Grant</h2>
        <p class="text-gray-300 text-lg leading-relaxed mb-6">The NEPO Scholarship is a corporate social responsibility initiative focused strictly on Nigerian undergraduates.</p>
        <button onclick="hideOverlay('aboutOverlay')" class="mt-10 px-8 py-3 border border-gray-500 rounded text-gray-300 bg-transparent">Close</button>
    </div>
</div>

<div id="contactOverlay" class="page-overlay">
    <button onclick="hideOverlay('contactOverlay')" class="absolute top-8 right-8 text-4xl bg-transparent border-none text-white cursor-pointer">&times;</button>
    <div class="max-w-md mx-auto mt-10">
        <h2 class="text-3xl font-bold mb-6 text-green-400">Contact Us</h2>
        <p class="text-xl">neposchlarship@gmail.com</p>
    </div>
</div>

<script>
    function toggleMenu() {
        const sideNav = document.getElementById('sideNav');
        const mask = document.getElementById('overlayMask');
        sideNav.classList.toggle('active');
        mask.style.display = sideNav.classList.contains('active') ? 'block' : 'none';
    }

    function showOverlay(id) {
        document.getElementById(id).style.display = 'flex';
        document.body.style.overflow = 'hidden';
        if(document.getElementById('sideNav').classList.contains('active')) toggleMenu();
    }

    function hideOverlay(id) {
        document.getElementById(id).style.display = 'none';
        document.body.style.overflow = 'auto';
    }
</script>
