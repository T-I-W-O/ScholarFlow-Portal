<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | NEPO Scholarship</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; color: #1a1a1a; }
        .form-card { background: white; padding: 35px 25px; width: 100%; max-width: 450px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); margin: 40px auto; }
        label { display: block; margin-top: 18px; margin-bottom: 6px; font-weight: 700; color: #2d3748; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-wrapper { position: relative; }
        input { width: 100%; padding: 12px 15px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; transition: all 0.2s; font-size: 16px; }
        input:focus { outline: none; border-color: #1a202c; box-shadow: 0 0 0 3px rgba(26, 32, 44, 0.05); }
        .validation-rule { display: flex; align-items: center; gap: 8px; font-size: 12px; margin-top: 5px; color: #718096; }
        .validation-rule.valid { color: #14532d; }
        .validation-rule.invalid { color: #e53e3e; }
        .btn-reset { background-color: #14532d; color: white; border: none; padding: 16px; width: 100%; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 30px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-reset:disabled { background-color: #cbd5e0; cursor: not-allowed; }
        .password-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #a0aec0; cursor: pointer; }
    </style>
</head>
<body>
{% include "header.html" %}
    <main class="px-4">
        <div class="max-w-xl mx-auto mt-12">
            <div class="text-center mb-6">
                <h1 class="text-3xl font-extrabold text-gray-900">Create New Password</h1>
                <p class="text-gray-500 mt-2 px-4">Secure your account with a strong password.</p>
            </div>

            <div class="form-card">
                <form id="resetForm" method="POST">
                    {% csrf_token %}
                    
                    <label>New Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                        <i class="fas fa-eye password-toggle" onclick="toggleVisibility('password')"></i>
                    </div>
                    
                    <div class="mt-3 space-y-1">
                        <div id="rule-length" class="validation-rule">
                            <i class="fas fa-circle text-[8px]"></i> At least 8 characters long
                        </div>
                        <div id="rule-digits" class="validation-rule">
                            <i class="fas fa-circle text-[8px]"></i> Contains at least 2 digits
                        </div>
                    </div>

                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirm" placeholder="••••••••" required>
                        <i class="fas fa-eye password-toggle" onclick="toggleVisibility('confirm')"></i>
                    </div>
                    <div id="rule-match" class="validation-rule">
                        <i class="fas fa-circle text-[8px]"></i> Passwords must match
                    </div>

                    <button type="submit" id="submitBtn" class="btn-reset" disabled>
                        UPDATE PASSWORD
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script>
        function toggleVisibility(id) {
            const el = document.getElementById(id);
            const icon = el.nextElementSibling;
            if (el.type === "password") {
                el.type = "text";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                el.type = "password";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirm');
        const submitBtn = document.getElementById('submitBtn');
        const rules = {
            length: document.getElementById('rule-length'),
            digits: document.getElementById('rule-digits'),
            match: document.getElementById('rule-match')
        };

        function validate() {
            const val = passwordInput.value;
            const conf = confirmInput.value;
            const isLongEnough = val.length >= 8;
            const hasTwoDigits = (val.match(/\d/g) || []).length >= 2;
            const isMatch = val === conf && val !== "";

            updateRule(rules.length, isLongEnough);
            updateRule(rules.digits, hasTwoDigits);
            updateRule(rules.match, isMatch);

            submitBtn.disabled = !(isLongEnough && hasTwoDigits && isMatch);
        }

        function updateRule(element, isValid) {
            if (isValid) {
                element.classList.remove('invalid');
                element.classList.add('valid');
                element.querySelector('i').classList.replace('fa-circle', 'fa-check-circle');
            } else {
                element.classList.remove('valid');
                element.classList.add('invalid');
                element.querySelector('i').classList.replace('fa-check-circle', 'fa-circle');
            }
        }

        passwordInput.addEventListener('input', validate);
        confirmInput.addEventListener('input', validate);

        // FORM SUBMISSION: Removed e.preventDefault() to allow Django to handle it
        document.getElementById('resetForm').onsubmit = () => {
            submitBtn.innerHTML = "UPDATING...";
            submitBtn.style.opacity = "0.7";
        };
    </script>
</body>
</html>
